var FRAMES_LR=[FRAME_B64_1,FRAME_B64_2,FRAME_B64_3,FRAME_B64_4];
var FRAMES_RL=[FRAME_B64_4,FRAME_B64_3,FRAME_B64_2,FRAME_B64_1];
var frameTimers=[];
var NORMAL_PHASE_MS=467;
var CLIP_DURATION_MS=233;
var MIN_PHASE_MS=100;
var MAX_PHASE_MS=3000;
var DIR_CHANGE_MIN_VAL=3;

var audioCtx=null,buffer1=null,buffer2=null;
var isRunning=false,hitCount=0;
var currentPhaseDuration=NORMAL_PHASE_MS,pendingSound=null;
var lastDirection=0,phaseStartTime=0,halfPhaseCount=0;
var gravityX=0,gravityY=0,gravityZ=0,gravityInited=false;
var calSamples=0,calSumX=0,calSumY=0,calSumZ=0,CAL_COUNT=30,hasCleanAccel=false;var gammaDir=0,gammaPhaseStart=0;

var frameImg=document.getElementById('frameImg');
var posterEl=document.getElementById('poster');
var vcEl=document.getElementById('vc');

posterEl.style.backgroundImage='url('+POSTER_B64+')';

function showFrame(n){showVideoLayer();frameImg.src=n}

function showVideoLayer(){
vcEl.style.display='block';
posterEl.style.display='none';
}

function animateFrames(seq,dur){}



function b64toArrayBuffer(b64){var bin=atob(b64);var len=bin.length;var bytes=new Uint8Array(len);for(var i=0;i<len;i++){bytes[i]=bin.charCodeAt(i)}return bytes.buffer}

function initAudio(){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
return Promise.all([
audioCtx.decodeAudioData(b64toArrayBuffer(AUDIO_B64_1)),
audioCtx.decodeAudioData(b64toArrayBuffer(AUDIO_B64_2))
]).then(function(b){buffer1=b[0];buffer2=b[1]})
}

function playSound(buf){
if(!audioCtx||!buf)return;
if(audioCtx.state==='suspended')audioCtx.resume();
var s=audioCtx.createBufferSource();s.buffer=buf;s.connect(audioCtx.destination);s.start(0);
}
function playSound1(){playSound(buffer1)}
function playSound2(){playSound(buffer2)}

function scheduleSound2(d){
if(pendingSound){clearTimeout(pendingSound);pendingSound=null}
if(d<=0){playSound2();return}
pendingSound=setTimeout(function(){playSound2();pendingSound=null},d)
}

function computeDelay(p){
var r=p/NORMAL_PHASE_MS;
if(r<=1)return Math.max(CLIP_DURATION_MS-(1-r)*CLIP_DURATION_MS,0);
return CLIP_DURATION_MS+(r-1)*CLIP_DURATION_MS;
}

function getCleanAccel(ev){
var acc=ev.acceleration;
if(acc&&(acc.x!==null||acc.y!==null||acc.z!==null)){hasCleanAccel=true;return{x:acc.x||0,y:acc.y||0,z:acc.z||0}}
var g=ev.accelerationIncludingGravity;if(!g)return null;
var rx=g.x||0,ry=g.y||0,rz=g.z||0;
if(!gravityInited){calSamples++;calSumX+=rx;calSumY+=ry;calSumZ+=rz;if(calSamples>=CAL_COUNT){gravityX=calSumX/calSamples;gravityY=calSumY/calSamples;gravityZ=calSumZ/calSamples;gravityInited=true}return null}
var a=0.02;gravityX=gravityX*(1-a)+rx*a;gravityY=gravityY*(1-a)+ry*a;gravityZ=gravityZ*(1-a)+rz*a;
return{x:rx-gravityX,y:ry-gravityY,z:rz-gravityZ}
}

function handleMotion(ev){
var c=getCleanAccel(ev);if(!c)return;
var ax=c.x,az=c.z;
var val=Math.sign(ax)*Math.sqrt(ax*ax+az*az);
if(!isRunning)return;
var dir=0;if(val>DIR_CHANGE_MIN_VAL)dir=1;else if(val<-DIR_CHANGE_MIN_VAL)dir=-1;
if(dir===0)return;
if(lastDirection!==0&&dir!==lastDirection){
var now=performance.now();var hd=now-phaseStartTime;
if(hd>60){halfPhaseCount++;if(halfPhaseCount%2===1){
currentPhaseDuration=Math.max(MIN_PHASE_MS,Math.min(MAX_PHASE_MS,hd*2));
var delay=computeDelay(currentPhaseDuration);
hitCount++;
}phaseStartTime=now}
}
if(dir!==0)lastDirection=dir;
}

async function activate(){
var btn=document.getElementById('startBtn');
btn.textContent='...';
try{
if(!audioCtx)await initAudio();
if(audioCtx.state==='suspended')await audioCtx.resume();
}catch(e){btn.textContent='error';return}
if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
try{var p=await DeviceMotionEvent.requestPermission();if(p!=='granted'){btn.textContent='motion denied';return}}catch(e){btn.textContent='perm error';return}
}
frameImg.src=FRAME_B64_1;

btn.classList.add('hidden');document.getElementById('mainTitle').classList.add('hidden');
isRunning=true;gammaDir=0;gammaPhaseStart=performance.now();hitCount=0;halfPhaseCount=0;lastDirection=0;
phaseStartTime=performance.now();currentPhaseDuration=NORMAL_PHASE_MS;
gravityInited=false;calSamples=0;calSumX=0;calSumY=0;calSumZ=0;
}

document.getElementById('startBtn').addEventListener('click',activate);
window.addEventListener('devicemotion',handleMotion,true);
window.addEventListener('deviceorientation',function(ev){if(!isRunning||ev.gamma===null)return;var g=ev.gamma;var d=g>2?1:g<-2?-1:0;if(d!==0&&gammaDir!==0&&d!==gammaDir){var now=performance.now();var dur=now-gammaPhaseStart;if(dur>60){if(d===1)playSound1();else playSound2();gammaPhaseStart=now}}if(d!==0)gammaDir=d;var fi;if(g<-12)fi=0;else if(g<0)fi=1;else if(g<12)fi=2;else fi=3;showFrame(FRAMES_LR[fi])},true);

window.addEventListener('keydown',function(e){
if(!isRunning)return;if(e.key!=='ArrowLeft'&&e.key!=='ArrowRight')return;
var dir=e.key==='ArrowRight'?1:-1;
var now=performance.now();
if(lastDirection!==0&&dir!==lastDirection){var hd=now-phaseStartTime;if(hd>60){halfPhaseCount++;if(halfPhaseCount%2===1){currentPhaseDuration=Math.max(MIN_PHASE_MS,Math.min(MAX_PHASE_MS,hd*2));var delay=computeDelay(currentPhaseDuration);playSound1();scheduleSound2(delay);hitCount++}phaseStartTime=now}}
lastDirection=dir;
});
